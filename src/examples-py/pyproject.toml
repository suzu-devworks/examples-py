
[project]
authors = [
  {name = "A.suzuki", email = "suzu.devworks@gmail.com"},
]
dependencies = [
  "pillow>=9.5.0",
]
description = ""
dynamic = ["version"]
license = {text = "MIT"}
name = "examples-py"
readme = "README.md"
requires-python = ">=3.11"
# version = "0.1.0"

[project.scripts]
examples-cli = "examples.console.command:main"

[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=61", "wheel"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.dynamic]
version = {attr = "examples.__version__"}

[tool.pdm.dev-dependencies]
dev = [
  "flake8>=6.0.0",
  "mypy>=1.3.0",
  "black>=23.3.0",
  "isort>=5.12.0",
  "pytest-cov>=4.0.0",
  "pyclean>=2.7.0",
]
test = [
  "pytz>=2023.3",
  "pyyaml>=6.0",
  "natsort>=8.3.1",
]

[tool.pytest.ini_options]
addopts = "-p no:cacheprovider"

[tool.black]
line-length = 119

[tool.isort]
line_length = 119
profile = "black"

[tool.pdm.scripts]
clean = "pyclean ."
cleanx = {shell = "find . | grep -E \"(/__pycache__$|\\.pyc$|\\.pyo$|/build$|/dist$|\\.egg-info$)\" | xargs rm -rf"}
lint = "flake8"
test = "pytest"
